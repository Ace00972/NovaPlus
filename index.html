<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaPlus</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Custom Titlebar -->
    <div class="titlebar">
        <div class="drag-region">
            <span class="app-logo">NOVAPLUS</span>
        </div>
        <div class="window-controls">
            <button id="btn-min" class="win-btn">─</button>
            <button id="btn-max" class="win-btn">▢</button>
            <button id="btn-close" class="win-btn close">✕</button>
        </div>
    </div>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <nav>
                <div class="nav-group">
                    <label>Library</label>
                    <button class="nav-item active" data-view="home">
                        <span class="icon">🏠</span> Home
                    </button>
                    <button class="nav-item" data-view="movies">
                        <span class="icon">🎬</span> Movies
                    </button>
                    <button class="nav-item" data-view="music">
                        <span class="icon">🎵</span> Music
                    </button>
                </div>
                <div class="nav-group">
                    <label>Manage</label>
                    <button class="nav-item" id="btn-add-folder">
                        <span class="icon">➕</span> Add Folder
                    </button>
                </div>
            </nav>
            
            <div class="sidebar-footer">
                <div class="theme-picker">
                    <div class="dot color-blue" data-color="#63b3ff"></div>
                    <div class="dot color-purple" data-color="#a385ff"></div>
                    <div class="dot color-pink" data-color="#ff85c1"></div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="content">
            <header class="content-header">
                <h1 id="view-title">Welcome Back</h1>
                <div class="search-bar">
                    <input type="text" id="search-input" placeholder="Search your library...">
                </div>
            </header>

            <div id="media-grid" class="media-grid">
                <!-- Content injected via JS -->
                <div class="empty-state">
                    <div class="empty-icon">📂</div>
                    <h2>No media found</h2>
                    <p>Click "Add Folder" to start building your library.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Fullscreen Player Overlay -->
    <div id="player-overlay" class="player-overlay hidden">
        <button class="close-player">✕</button>
        <div class="player-container">
            <video id="video-element" controls></video>
            <div id="audio-player-ui" class="audio-player-ui hidden">
                <div class="album-art-large">🎵</div>
                <h2 id="now-playing-title">Song Title</h2>
                <p id="now-playing-artist">Artist Name</p>
                <audio id="audio-element" controls></audio>
            </div>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
