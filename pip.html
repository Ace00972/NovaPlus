<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NovaPlus PiP</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #63b3ff;
            --accent-glow: rgba(99,179,255,0.26);
            --bg: rgba(10,13,20,0.97);
            --glass: rgba(255,255,255,0.05);
            --glass-border: rgba(255,255,255,0.1);
            --text: #e8edf5;
            --muted: #8899b0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: transparent;
            color: var(--text);
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .pip {
            width: 100%;
            height: 100%;
            background: var(--bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 14px 18px;
            box-shadow: 0 16px 40px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            -webkit-app-region: drag;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .app-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent);
            font-weight: 700;
        }

        .top-ctrls {
            display: flex;
            gap: 6px;
            -webkit-app-region: no-drag;
        }

        .top-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--text);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .top-btn:hover {
            background: rgba(255,255,255,0.15);
            transform: scale(1.05);
        }
        #btn-close:hover {
            background: rgba(239,68,68,0.25);
            color: #ff6b6b;
            border-color: rgba(239,68,68,0.4);
        }

        .main-info {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 4px;
        }

        .poster-frame {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .poster-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .meta-text {
            overflow: hidden;
            flex-grow: 1;
        }
        .title {
            font-size: 0.93rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }
        .artist {
            font-size: 0.78rem;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            -webkit-app-region: no-drag;
        }

        .media-btns {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--text);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .btn-sm { width: 28px; height: 28px; font-size: 0.75rem; }
        .btn-md { 
            width: 36px; 
            height: 36px; 
            font-size: 1rem; 
            background: var(--text); 
            color: var(--bg);
            border: none;
        }
        .btn:hover { transform: scale(1.08); }
        .btn-sm:hover { background: rgba(255,255,255,0.12); }
        .btn-md:hover { background: #ffffff; box-shadow: 0 0 12px var(--accent-glow); }

        .vol-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-grow: 1;
            max-width: 100px;
        }
        .vol-wrap span { font-size: 0.85rem; color: var(--muted); }
        .slider {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: var(--glass-border);
            border-radius: 2px;
            outline: none;
        }
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            transition: transform 0.1s;
        }
        .slider::-webkit-slider-thumb:hover { transform: scale(1.3); }

        .progress-container {
            -webkit-app-region: no-drag;
            margin-bottom: 4px;
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--glass-border);
            border-radius: 2px;
            position: relative;
            cursor: pointer;
            margin-bottom: 4px;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            width: 0%;
            box-shadow: 0 0 8px var(--accent-glow);
        }
        .time-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--muted);
        }
    </style>
</head>
<body>

<div class="pip">
    <div class="header">
        <div class="app-title">NovaPlus Mini</div>
        <div class="top-ctrls">
            <button class="top-btn" id="btn-expand" title="Expand Player">⤢</button>
            <button class="top-btn" id="btn-close" title="Close">✕</button>
        </div>
    </div>

    <div class="main-info">
        <div class="poster-frame">
            <img id="pip-img" src="" alt="" style="display: none;">
        </div>
        <div class="meta-text">
            <div class="title" id="pip-title">Nothing Playing</div>
            <div class="artist" id="pip-artist">Standby</div>
        </div>
    </div>

    <div class="progress-container">
        <div class="progress-bar" id="pip-progress">
            <div class="progress-fill" id="pip-fill"></div>
        </div>
        <div class="time-labels">
            <span id="pip-current">0:00</span>
            <span id="pip-duration">0:00</span>
        </div>
    </div>

    <div class="controls-row">
        <div class="media-btns">
            <button class="btn btn-sm" id="btn-prev">⏮</button>
            <button class="btn btn-md" id="btn-play">▶</button>
            <button class="btn btn-sm" id="btn-next">⏭</button>
        </div>
        <div class="vol-wrap">
            <span>🔊</span>
            <input type="range" class="slider" id="pip-vol" min="0" max="100" value="80">
        </div>
    </div>
</div>

<script>
    function fmt(s) {
        if (!s || isNaN(s)) return '0:00';
        const m = Math.floor(s / 60);
        const sec = Math.floor(s % 60);
        return `${m}:${sec < 10 ? '0' : ''}${sec}`;
    }

    // Capture explicit track initialization properties resiliently
    window.electronAPI.onPipTrack((track) => {
        const titleText = track.name || track.title || 'Unknown Title';
        const artistText = track.artist || 'Unknown Artist';

        document.getElementById('pip-title').innerText  = titleText;
        document.getElementById('pip-artist').innerText = artistText;
        
        const img = document.getElementById('pip-img');
        if (track.poster) {
            img.src = window.electronAPI.toMediaUrl(track.poster);
            img.style.display = 'block';
        } else {
            img.style.display = 'none';
        }
        document.getElementById('btn-play').innerText = '⏸';
    });

    // Handle time tick synchronization mapping
    window.electronAPI.onPipTime((d) => {
        const pct = d.duration ? (d.current / d.duration) * 100 : 0;
        document.getElementById('pip-fill').style.width    = pct + '%';
        document.getElementById('pip-current').innerText   = fmt(d.current);
        document.getElementById('pip-duration').innerText  = fmt(d.duration);
    });

    // Handle play state sync
    window.electronAPI.onPipState((playing) => {
        document.getElementById('btn-play').innerText = playing ? '⏸' : '▶';
    });

    // Direct IPC Command Bridge Routing Actions
    document.getElementById('btn-close').onclick  = () => window.electronAPI.pipCmd('close');
    document.getElementById('btn-expand').onclick = () => window.electronAPI.pipCmd('expand');
    document.getElementById('btn-prev').onclick   = () => window.electronAPI.pipCmd('prev');
    document.getElementById('btn-play').onclick   = () => window.electronAPI.pipCmd('playpause');
    document.getElementById('btn-next').onclick   = () => window.electronAPI.pipCmd('next');

    document.getElementById('pip-vol').oninput = e =>
        window.electronAPI.pipCmd({ action: 'volume', value: +e.target.value });

    document.getElementById('pip-progress').onclick = e => {
        const r = e.currentTarget.getBoundingClientRect();
        const pct = (e.clientX - r.left) / r.width;
        window.electronAPI.pipCmd({ action: 'seek', value: pct });
    };
</script>
</body>
</html>
