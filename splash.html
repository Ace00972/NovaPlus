<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NovaPlus</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #080a0f;
      width: 500px;
      height: 400px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      -webkit-app-region: drag;
    }

    /* Noise texture */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 20;
      opacity: 0.5;
    }

    /* Ambient glow blobs */
    .blob-1 {
      position: fixed;
      width: 320px; height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99,179,255,0.10) 0%, transparent 70%);
      top: -60px; left: -80px;
      pointer-events: none;
      animation: blobFloat1 6s ease-in-out infinite alternate;
    }

    .blob-2 {
      position: fixed;
      width: 280px; height: 240px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(155,109,255,0.09) 0%, transparent 70%);
      bottom: -60px; right: -60px;
      pointer-events: none;
      animation: blobFloat2 7s ease-in-out infinite alternate;
    }

    @keyframes blobFloat1 {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(20px, 15px) scale(1.08); }
    }
    @keyframes blobFloat2 {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(-15px, -20px) scale(1.06); }
    }

    /* Subtle border */
    .border-glow {
      position: fixed;
      inset: 0;
      border: 1px solid rgba(99,179,255,0.08);
      border-radius: 12px;
      pointer-events: none;
      z-index: 10;
    }

    /* Grid lines for depth */
    .grid-lines {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(99,179,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,179,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 1;
      mask-image: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.7) 100%);
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      z-index: 5;
      animation: containerReveal 0.7s cubic-bezier(0.4,0,0.2,1) forwards;
    }

    @keyframes containerReveal {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 10px;
    }

    .logo-img {
      width: 52px;
      height: 52px;
      border-radius: 13px;
      object-fit: cover;
      box-shadow: 0 8px 28px rgba(0,0,0,0.5), 0 0 0 1px rgba(99,179,255,0.12);
    }

    .logo-text-wrap {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 8px;
      background: linear-gradient(135deg, #e8edf5 10%, #63b3ff 60%, #9b6dff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }

    .logo-dot-row {
      display: flex;
      align-items: center;
      gap: 5px;
      padding-left: 2px;
    }

    .logo-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: #63b3ff;
      box-shadow: 0 0 7px #63b3ff;
      animation: dotPulse 2s ease-in-out infinite;
    }

    @keyframes dotPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.7); }
    }

    .logo-dot:nth-child(2) { background: rgba(99,179,255,0.4); animation-delay: 0.3s; box-shadow: none; }
    .logo-dot:nth-child(3) { background: rgba(99,179,255,0.2); animation-delay: 0.6s; box-shadow: none; }

    .tagline {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      letter-spacing: 3.5px;
      color: #3a4a5e;
      text-transform: uppercase;
      margin-bottom: 32px;
      font-weight: 300;
    }

    .bar-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 240px;
    }

    .bar-wrap {
      width: 100%;
      height: 2px;
      background: rgba(255,255,255,0.05);
      border-radius: 99px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 99px;
      background: linear-gradient(90deg, #63b3ff, #9b6dff);
      box-shadow: 0 0 10px rgba(99,179,255,0.6);
      animation: load 2.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes load {
      0%   { width: 0%; }
      35%  { width: 48%; }
      65%  { width: 72%; }
      88%  { width: 88%; }
      100% { width: 100%; }
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #63b3ff;
      animation: statusPulse 1s ease-in-out infinite;
    }

    @keyframes statusPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .status-text {
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      color: #2a3545;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 400;
      animation: statusCycle 2.6s steps(1) forwards;
    }

    @keyframes statusCycle {
      0%   { content: 'LOADING'; }
      40%  { color: #2a3545; }
      100% { color: #3a5a7a; }
    }

    .version {
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      color: #1e2836;
      letter-spacing: 1.5px;
      margin-top: 28px;
      font-weight: 300;
    }
  </style>
</head>
<body>
  <div class="blob-1"></div>
  <div class="blob-2"></div>
  <div class="grid-lines"></div>
  <div class="border-glow"></div>

  <div class="container">
    <div class="logo-row">
      <img class="logo-img" src="logo.png" alt="NovaPlus" onerror="this.style.display='none'">
      <div class="logo-text-wrap">
        <span class="logo-text">NOVAPLUS</span>
        <div class="logo-dot-row">
          <div class="logo-dot"></div>
          <div class="logo-dot"></div>
          <div class="logo-dot"></div>
        </div>
      </div>
    </div>

    <div class="tagline">Your Personal Entertainment Hub</div>

    <div class="bar-container">
      <div class="bar-wrap">
        <div class="bar-fill"></div>
      </div>
      <div class="status-row">
        <div class="status-dot"></div>
        <span class="status-text">INITIALIZING</span>
      </div>
    </div>

    <div class="version">v1.1.0</div>
  </div>
</body>
</html>
